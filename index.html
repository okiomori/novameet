<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NovaMeet</title>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: linear-gradient(135deg,#dbe4ff,#f3dcff,#ffe0f0);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* blobs */
.blob {
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle,#ff7ad9,#7afcff);
  filter: blur(120px);
  border-radius: 50%;
  animation: move 10s infinite alternate ease-in-out;
}

.blob2 {
  right: 0;
  bottom: 0;
  background: radial-gradient(circle,#7a9cff,#ff9cf0);
}

@keyframes move {
  from { transform: translate(0,0); }
  to { transform: translate(50px,-50px); }
}

.card {
  position: relative;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(25px);
  border-radius: 30px;
  padding: 40px;
  width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.1);
  z-index: 2;
}

h1 {
  margin: 0;
  font-size: 32px;
}

p {
  color: #666;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border-radius: 14px;
  border: none;
  color: white;
  font-weight: 600;
  cursor: pointer;
  background: linear-gradient(135deg,#6a5cff,#9b7bff);
  transition: 0.2s;
}

button:hover {
  transform: scale(1.02);
}

.video-grid {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}

video {
  width: 180px;
  border-radius: 12px;
  background: black;
}
</style>

</head>

<body>

<div class="blob"></div>
<div class="blob blob2"></div>

<div class="card">
  <h1>NovaMeet</h1>
  <p>Созвоны прямо в браузере</p>

  <input id="name" placeholder="Ваше имя">
  <input id="room" placeholder="Комната">

<button onclick="startCall()">Войти в комнату</button>

  <div class="video-grid" id="videos"></div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script src="https://unpkg.com/simple-peer@9/simplepeer.min.js"></script>

<script>
const socket = io("https://novameet-ktl5.onrender.com");

let peers = {};
let myStream;

async function startCall() {
  const room = document.getElementById("room").value;
  const name = document.getElementById("name").value;

  if (!room) {
    alert("Введите комнату");
    return;
  }

  myStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  addVideo(myStream, true);

  socket.emit("join-room", { roomId: room, userName: name });

  socket.on("all-users", users => {
    users.forEach(user => {
      const peer = createPeer(user.id, socket.id, myStream);
      peers[user.id] = peer;
    });
  });

  socket.on("user-joined", ({ signal, callerId }) => {
    const peer = addPeer(signal, callerId, myStream);
    peers[callerId] = peer;
  });

  socket.on("receiving-returned-signal", ({ id, signal }) => {
    peers[id].signal(signal);
  });
}

function createPeer(userToSignal, callerId, stream) {
  const peer = new SimplePeer({
    initiator: true,
    trickle: false,
    stream
  });

  peer.on("signal", signal => {
    socket.emit("sending-signal", {
      userToSignal,
      callerId,
      signal
    });
  });

  peer.on("stream", stream => {
    addVideo(stream);
  });

  return peer;
}

function addPeer(incomingSignal, callerId, stream) {
  const peer = new SimplePeer({
    initiator: false,
    trickle: false,
    stream
  });

  peer.on("signal", signal => {
    socket.emit("returning-signal", {
      signal,
      callerId
    });
  });

  peer.on("stream", stream => {
    addVideo(stream);
  });

  peer.signal(incomingSignal);
  return peer;
}

function addVideo(stream, muted = false) {
  const video = document.createElement("video");
  video.srcObject = stream;
  video.autoplay = true;
  video.muted = muted;
  document.getElementById("videos").appendChild(video);
}
</script>

</body>
</html>
