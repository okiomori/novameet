<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NovaMeet</title>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: linear-gradient(135deg,#dbe4ff,#f3dcff);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
  border-radius: 30px;
  padding: 40px;
  width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.1);
}

h1 {
  margin: 0 0 10px;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border-radius: 14px;
  border: none;
  color: white;
  background: linear-gradient(135deg,#6a5cff,#9b7bff);
  cursor: pointer;
}

.video-grid {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}

video {
  width: 180px;
  border-radius: 12px;
  background: black;
}
</style>
</head>

<body>

<div class="container">
  <h1>NovaMeet</h1>

  <input id="name" placeholder="Ваше имя">
  <input id="room" placeholder="Комната">

  <button onclick="startCall()">Войти</button>

  <div class="video-grid" id="videos"></div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="https://unpkg.com/simple-peer@9/simplepeer.min.js"></script>

<script>
const socket = io("http://localhost:3001"); // потом заменим

let peers = {};
let myStream;

async function startCall() {
  const room = document.getElementById("room").value;
  const name = document.getElementById("name").value;

  myStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  addVideo(myStream, true);

  socket.emit("join-room", { roomId: room, userName: name });

  socket.on("all-users", users => {
    users.forEach(user => {
      const peer = createPeer(user.id, socket.id, myStream);
      peers[user.id] = peer;
    });
  });

  socket.on("user-joined", ({ signal, callerId }) => {
    const peer = addPeer(signal, callerId, myStream);
    peers[callerId] = peer;
  });

  socket.on("receiving-returned-signal", ({ id, signal }) => {
    peers[id].signal(signal);
  });
}

function createPeer(userToSignal, callerId, stream) {
  const peer = new SimplePeer({
    initiator: true,
    trickle: false,
    stream
  });

  peer.on("signal", signal => {
    socket.emit("sending-signal", {
      userToSignal,
      callerId,
      signal
    });
  });

  peer.on("stream", stream => {
    addVideo(stream);
  });

  return peer;
}

function addPeer(incomingSignal, callerId, stream) {
  const peer = new SimplePeer({
    initiator: false,
    trickle: false,
    stream
  });

  peer.on("signal", signal => {
    socket.emit("returning-signal", {
      signal,
      callerId
    });
  });

  peer.on("stream", stream => {
    addVideo(stream);
  });

  peer.signal(incomingSignal);
  return peer;
}

function addVideo(stream, muted = false) {
  const video = document.createElement("video");
  video.srcObject = stream;
  video.autoplay = true;
  video.muted = muted;
  document.getElementById("videos").appendChild(video);
}
</script>

</body>
</html>
